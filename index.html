<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快点 AI 导航 - 发现最好的 AI 工具</title>
    <meta name="description"
        content="快点 AI 导航是一个精选 AI 工具导航网站，收录了 ChatGPT、Claude、Midjourney、DALL-E、Stable Diffusion 等优质 AI 工具，支持智能搜索和分类筛选，助您快速发现最适合的 AI 工具。">
    <meta name="keywords"
        content="AI导航,AI工具,ChatGPT,Claude,Midjourney,DALL-E,Stable Diffusion,人工智能,AI对话,AI绘画,AI编程,AI创作,智能助手,语言模型">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
        }

        .category-btn.active {
            border-color: #000;
            background-color: #f8f9fa;
        }

        .section-title {
            display: flex;
            items: center;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .card-anim {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body class="text-zinc-900">

    <header class="flex justify-between items-center px-8 py-4 border-b border-zinc-100">
        <div class="flex items-center gap-2">
            <i data-lucide="sparkles" class="w-5 h-5"></i>
            <span class="font-bold text-lg">快点 AI 导航</span>
        </div>
        <a href="https://github.com/muzihuaner/ainav/issues"> <button
                class="bg-zinc-900 text-white px-4 py-1.5 rounded-lg text-sm font-medium hover:bg-zinc-800 transition-colors">提交工具</button></a>

    </header>

    <section class="max-w-4xl mx-auto text-center pt-16 pb-12 px-6">
        <h1 class="text-4xl font-extrabold mb-8 tracking-tight">精选优质 AI 工具，助你开启智能新时代</h1>
        <div class="relative max-w-2xl mx-auto">
            <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400 w-5 h-5"></i>
            <input type="text" id="searchInput" placeholder="搜索AI工具..."
                class="w-full pl-14 pr-6 py-4 rounded-2xl border border-zinc-200 focus:outline-none focus:ring-2 focus:ring-zinc-100 transition-all text-lg shadow-sm">
        </div>
    </section>

    <section class="max-w-6xl mx-auto px-6 mb-12">
        <div id="categoryGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3">
            <button data-cat="all"
                class="category-btn active flex items-center justify-center gap-2 py-2.5 border border-zinc-200 rounded-xl hover:border-zinc-400 transition-all text-sm font-medium">
                <i data-lucide="layout-grid" class="w-4 h-4"></i> 全部
            </button>
        </div>
    </section>

    <main class="max-w-6xl mx-auto px-6 pb-20">

        <div id="featuredWrapper">
            <div class="section-title">
                <i data-lucide="award" class="w-6 h-6 text-amber-500"></i>
                <span>精选推荐</span>
            </div>
            <div id="featuredGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-16"></div>
        </div>

        <div class="section-title border-t border-zinc-50 pt-12">
            <i data-lucide="list" class="w-6 h-6"></i>
            <span id="listTitle">全部工具</span>
        </div>
        <div id="allGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div id="noResults" class="hidden text-center py-20 text-zinc-400">
            没有找到相关的工具
        </div>
    </main>

    <script>
        const categoryMap = {
            "chat": "AI对话", "writing": "AI写作", "image": "AI图像", "video": "AI视频",
            "audio": "AI音频", "code": "AI编程", "office": "AI办公", "design": "AI设计",
            "agent": "AI智能体", "search": "AI搜索", "learning": "AI学习", "model": "AI模型", "detection": "AI检测", "prompt": "AI提示词"
        };

        let allTools = [];
        let currentCategory = 'all';

        async function init() {
            try {
                const res = await fetch('ai_tools_full.json');
                allTools = await res.json();
                renderCategories();
                renderUI();
            } catch (e) { console.error("加载失败", e); }
        }

        function renderCategories() {
            const container = document.getElementById('categoryGrid');
            Object.keys(categoryMap).forEach(key => {
                const btn = document.createElement('button');
                btn.className = "category-btn flex items-center justify-center gap-2 py-2.5 border border-zinc-200 rounded-xl hover:border-zinc-400 transition-all text-sm font-medium text-zinc-600";
                btn.innerHTML = categoryMap[key];
                btn.onclick = () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active', 'border-zinc-900', 'text-zinc-900'));
                    btn.classList.add('active', 'border-zinc-900', 'text-zinc-900');
                    currentCategory = key;
                    document.getElementById('listTitle').innerText = categoryMap[key] || "全部工具";
                    renderUI(document.getElementById('searchInput').value);
                };
                container.appendChild(btn);
            });
        }

        // 卡片渲染模板
        function createCardHtml(tool) {
            const isFeatured = tool.tags.includes('精选');
            return `
                <a href="${tool.url || '#'}" target="_blank" class="card-anim group border border-zinc-100 rounded-[1.5rem] p-6 hover:shadow-xl hover:border-transparent transition-all bg-white flex flex-col h-full">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-3">
                            <img src="${tool.icon}" class="w-10 h-10 rounded-xl border border-zinc-50 object-cover" onerror="this.src='https://ui-avatars.com/api/?name=${tool.name}'">
                            <h3 class="font-bold text-lg group-hover:text-black transition-colors">${tool.name}</h3>
                        </div>
                        ${isFeatured ? `<span class="text-[10px] px-2 py-0.5 border border-amber-200 bg-amber-50 text-amber-600 rounded font-bold uppercase">精选</span>` : ''}
                    </div>
                    <p class="text-zinc-500 text-sm mb-6 line-clamp-2 h-10 leading-relaxed">${tool.description}</p>
                    <div class="flex flex-wrap gap-2 mb-8 flex-grow">
                        ${tool.tags.filter(t => t !== '精选').slice(0, 3).map(tag => `
                            <span class="px-2.5 py-1 bg-zinc-50 text-zinc-400 text-[11px] rounded-lg font-medium border border-zinc-100/50 uppercase tracking-tight">${tag}</span>
                        `).join('')}
                    </div>
                    <div class="flex items-center justify-center gap-1 w-full py-2.5 bg-zinc-50 rounded-xl text-zinc-400 text-sm font-medium group-hover:bg-zinc-900 group-hover:text-white transition-all">
                        访问工具 <i data-lucide="arrow-up-right" class="w-4 h-4"></i>
                    </div>
                </a>
            `;
        }

        function renderUI(filterText = '') {
            const fGrid = document.getElementById('featuredGrid');
            const aGrid = document.getElementById('allGrid');
            const fWrapper = document.getElementById('featuredWrapper');

            // 1. 获取基础过滤后的数据
            const filtered = allTools.filter(t => {
                const matchesCat = currentCategory === 'all' || t.category === currentCategory;
                const matchesSearch = t.name.toLowerCase().includes(filterText.toLowerCase()) ||
                    t.description.toLowerCase().includes(filterText.toLowerCase());
                return matchesCat && matchesSearch;
            });

            // 2. 提取精选工具（用于顶部橱窗）
            const featuredList = filtered.filter(t => t.tags.includes('精选'));

            // 3. 渲染精选区 (如果没有精选内容则隐藏)
            if (featuredList.length > 0) {
                fWrapper.classList.remove('hidden');
                fGrid.innerHTML = featuredList.map(t => createCardHtml(t)).join('');
            } else {
                fWrapper.classList.add('hidden');
            }

            // 4. 渲染全部工具区 (这里直接渲染所有 filtered 数据)
            aGrid.innerHTML = filtered.map(t => createCardHtml(t)).join('');

            // 5. 空状态处理
            document.getElementById('noResults').classList.toggle('hidden', filtered.length > 0);

            lucide.createIcons();
        }

        document.getElementById('searchInput').addEventListener('input', (e) => renderUI(e.target.value));

        init();
    </script>
</body>

</html>
