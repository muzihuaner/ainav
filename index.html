<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快点 AI 导航 - 发现最好的 AI 工具</title>
    <meta name="description" content="快点 AI 导航是一个精选 AI 工具导航网站，收录了 ChatGPT、Claude、Midjourney、DALL-E、Stable Diffusion 等优质 AI 工具，支持智能搜索和分类筛选，助您快速发现最适合的 AI 工具。">
    <meta name="keywords" content="AI导航,AI工具,ChatGPT,Claude,Midjourney,DALL-E,Stable Diffusion,人工智能,AI对话,AI绘画,AI编程,AI创作,智能助手,语言模型">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'dark-bg': '#0f172a',
                        'dark-card': '#1e293b',
                        'dark-border': '#334155',
                        'primary': '#3b82f6',
                        'secondary': '#8b5cf6',
                        'accent': '#06b6d4',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.5s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.loli.net/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        /* 页面加载动画 */
        .page-loader {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        .loader-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 头部渐变背景 */
        .header-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
        }
        
        .header-gradient::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
        }
        
        /* 搜索框样式 */
        .search-container {
            position: relative;
        }
        
        .search-input {
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .search-input:focus {
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3), 0 10px 40px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }
        
        .search-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
        }
        
        .search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        
        .search-btn:active {
            transform: scale(0.95);
        }
        
        /* 卡片样式 */
        .tool-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .tool-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .tool-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15), 0 8px 16px -8px rgba(0, 0, 0, 0.1);
        }
        
        .tool-card:hover::before {
            opacity: 1;
        }
        
        .dark .tool-card:hover {
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.4), 0 8px 16px -8px rgba(0, 0, 0, 0.3);
        }
        
        /* 卡片图标样式 */
        .tool-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            transition: all 0.3s ease;
            position: relative;
        }
        
        .tool-icon::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 14px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }
        
        .tool-card:hover .tool-icon::after {
            opacity: 1;
        }
        
        .tool-icon img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
        }
        
        /* 精选徽章 */
        .featured-badge {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
        }
        
        /* 评分星星 */
        .rating-star {
            color: #f59e0b;
            filter: drop-shadow(0 1px 2px rgba(245, 158, 11, 0.3));
        }
        
        /* 标签样式 */
        .tag {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            color: #4b5563;
            transition: all 0.2s ease;
        }
        
        .tag:hover {
            background: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
            transform: translateY(-1px);
        }
        
        .dark .tag {
            background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
            color: #9ca3af;
        }
        
        /* 访问按钮样式 */
        .visit-btn {
            background: linear-gradient(135deg, #1f2937 0%, #374151 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .dark .visit-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
        
        .visit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .visit-btn:hover::before {
            opacity: 1;
        }
        
        .visit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        
        .visit-btn span {
            position: relative;
            z-index: 1;
        }
        
        .visit-btn:active {
            transform: scale(0.95);
        }
        
        /* 分类按钮样式 */
        .category-btn {
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        .category-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            transform: scaleY(0);
            transition: transform 0.2s ease;
        }
        
        .category-btn:hover {
            background: #f3f4f6;
            transform: translateX(4px);
        }
        
        .dark .category-btn:hover {
            background: #374151;
        }
        
        .category-btn.active {
            background: linear-gradient(135deg, #1f2937 0%, #374151 100%);
            color: white;
        }
        
        .dark .category-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
        
        .category-btn.active::before {
            transform: scaleY(1);
        }
        
        /* 数量徽章 */
        .count-badge {
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 0.75rem;
        }
        
        .category-btn.active .count-badge {
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* 滚动触发动画 */
        .animate-on-scroll {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        
        .animate-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 返回顶部按钮 */
        .back-to-top {
            transition: all 0.3s ease;
            position: relative;
        }
        
        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .back-to-top.hidden {
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
        }
        
        .back-to-top:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }
        
        .back-to-top:active {
            transform: scale(0.9);
        }
        
        /* 进度环 */
        .progress-ring {
            position: absolute;
            inset: -2px;
        }
        
        .progress-ring circle {
            fill: none;
            stroke: #3b82f6;
            stroke-width: 2;
            stroke-dasharray: 113;
            stroke-dashoffset: 113;
            transition: stroke-dashoffset 0.3s ease;
            transform: rotate(-90deg);
            transform-origin: center;
        }
        
        /* 空状态动画 */
        .empty-state {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* 骨架屏 */
        .skeleton {
            background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        .dark .skeleton {
            background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%);
            background-size: 200% 100%;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* 淡入动画 */
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 视图切换按钮 */
        .view-btn {
            transition: all 0.2s ease;
        }
        
        .view-btn.active {
            background: linear-gradient(135deg, #1f2937 0%, #374151 100%);
            color: white;
        }
        
        .dark .view-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
        
        /* 列表视图 */
        .list-view .tool-card {
            display: flex;
            flex-direction: row;
            align-items: center;
        }
        
        .list-view .tool-card .card-content {
            flex: 1;
        }
        
        .list-view .tool-card .card-action {
            width: 150px;
            flex-shrink: 0;
        }
        
        /* 主题切换按钮 */
        .theme-toggle {
            transition: all 0.3s ease;
        }
        
        .theme-toggle:hover {
            transform: rotate(15deg) scale(1.1);
        }
        
        /* 页脚链接 */
        .footer-link {
            transition: all 0.2s ease;
        }
        
        .footer-link:hover {
            color: #3b82f6;
            transform: translateX(4px);
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-dark-bg min-h-screen transition-colors duration-300">

                        <p class="text-gray-400 dark:text-gray-500 mt-2">尝试调整搜索关键词或筛选条件</p>
                        <button onclick="resetFilters()" class="mt-4 px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors">
                            <i class="fas fa-redo mr-2"></i>重置筛选
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- 返回顶部按钮带进度环 -->
    <button id="backToTop" class="back-to-top hidden fixed bottom-8 right-8 bg-gray-900 dark:bg-blue-600 text-white p-4 rounded-full shadow-lg z-50" aria-label="回到顶部">
        <svg class="progress-ring" width="44" height="44" viewBox="0 0 44 44">
            <circle cx="22" cy="22" r="18"></circle>
        </svg>
        <i class="fas fa-arrow-up absolute inset-0 m-auto text-sm"></i>
    </button>
    
    <footer class="bg-white dark:bg-dark-card border-t border-gray-200 dark:border-dark-border py-12 mt-12 transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-4">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-8 mb-8">
                <div>
                    <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4 flex items-center gap-2">
                        <span class="text-2xl">🚀</span>
                        快点 AI 导航
                    </h3>
                    <p class="text-gray-600 dark:text-gray-400 text-sm">发现最好的 AI 工具，提升你的工作效率</p>
                    <div class="flex gap-3 mt-4">
                        <a href="https://github.com/muzihuaner/ainav" target="_blank" class="p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-white transition-colors" aria-label="GitHub">
                            <i class="fab fa-github text-xl"></i>
                        </a>
                    </div>
                </div>
                <div>
                    <h4 class="font-semibold text-gray-900 dark:text-white mb-4">快速链接</h4>
                    <ul class="space-y-2">
                        <li><a href="#" class="footer-link text-gray-600 dark:text-gray-400 text-sm block">首页</a></li>
                        <li><a href="https://github.com/muzihuaner/ainav/issues" target="_blank" class="footer-link text-gray-600 dark:text-gray-400 text-sm block">提交工具</a></li>
                        <li><a href="https://github.com/muzihuaner/ainav/issues" target="_blank" class="footer-link text-gray-600 dark:text-gray-400 text-sm block">反馈建议</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="font-semibold text-gray-900 dark:text-white mb-4">热门分类</h4>
                    <ul class="space-y-2" id="footerCategories">
                    </ul>
                </div>
                <div>
                    <h4 class="font-semibold text-gray-900 dark:text-white mb-4">关于</h4>
                    <ul class="space-y-2">
                        <li><a href="#" class="footer-link text-gray-600 dark:text-gray-400 text-sm block">关于我们</a></li>
                        <li><a href="#" class="footer-link text-gray-600 dark:text-gray-400 text-sm block">联系方式</a></li>
                        <li><a href="#" class="footer-link text-gray-600 dark:text-gray-400 text-sm block">隐私政策</a></li>
                    </ul>
                </div>
            </div>
            <div class="pt-8 border-t border-gray-200 dark:border-dark-border text-center">
                <p class="text-gray-600 dark:text-gray-400 text-sm">© 2026 快点 AI 导航. All rights reserved.</p>
            </div>
        </div>
    </footer>
    
    <script>
        let aiData = [];
        let currentCategory = '全部';
        let searchQuery = '';
        let minRating = 0;
        let featuredOnly = false;
        let currentSort = 'default';
        let selectedTag = null;
        let currentView = 'grid'; // 'grid' or 'list'
        
        // Dark Mode Logic
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        // Check local storage or system preference
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        } else {
            html.classList.remove('dark');
        }
        
        themeToggle.addEventListener('click', () => {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
            }
        });

        // 页面加载完成后隐藏加载器
        function hideLoader() {
            const loader = document.getElementById('pageLoader');
            if (loader) {
                loader.classList.add('hidden');
            }
        }

        // 设置搜索
        function setSearch(query) {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.value = query;
                searchQuery = query;
                renderTools();
            }
        }
        window.setSearch = setSearch;

        // 重置筛选
        function resetFilters() {
            currentCategory = '全部';
            searchQuery = '';
            minRating = 0;
            featuredOnly = false;
            selectedTag = null;
            document.getElementById('searchInput').value = '';
            document.getElementById('featuredFilter').checked = false;
            document.querySelectorAll('.rating-filter').forEach(cb => cb.checked = false);
            renderCategories();
            renderTags();
            renderTools();
        }
        window.resetFilters = resetFilters;

        // 侧边栏切换
        const sidebarToggle = document.getElementById('sidebarToggle');
        const closeSidebar = document.getElementById('closeSidebar');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        function openSidebar() {
            sidebar.classList.remove('-translate-x-full');
            sidebarOverlay.classList.remove('hidden');
        }

        function closeSidebarFn() {
            sidebar.classList.add('-translate-x-full');
            sidebarOverlay.classList.add('hidden');
        }

        if (sidebarToggle) {
            sidebarToggle.addEventListener('click', openSidebar);
        }

        if (closeSidebar) {
            closeSidebar.addEventListener('click', closeSidebarFn);
        }

        if (sidebarOverlay) {
            sidebarOverlay.addEventListener('click', closeSidebarFn);
        }

        // 视图切换
        const gridViewBtn = document.getElementById('gridViewBtn');
        const listViewBtn = document.getElementById('listViewBtn');
        const toolsGrid = document.getElementById('toolsGrid');

        function setView(view) {
            currentView = view;
            if (view === 'list') {
                toolsGrid.classList.remove('grid-cols-1', 'md:grid-cols-2', 'xl:grid-cols-3');
                toolsGrid.classList.add('grid-cols-1');
                listViewBtn.classList.add('active');
                gridViewBtn.classList.remove('active');
            } else {
                toolsGrid.classList.remove('grid-cols-1');
                toolsGrid.classList.add('grid-cols-1', 'md:grid-cols-2', 'xl:grid-cols-3');
                gridViewBtn.classList.add('active');
                listViewBtn.classList.remove('active');
            }
        }

        if (gridViewBtn) {
            gridViewBtn.addEventListener('click', () => setView('grid'));
        }

        if (listViewBtn) {
            listViewBtn.addEventListener('click', () => setView('list'));
        }

        async function loadData() {
            try {
                const response = await fetch('ai.json');
                aiData = await response.json();
                renderCategories();
                renderTags();
                renderTools();
                renderFooterCategories();
                hideLoader();
                initScrollAnimations();
            } catch (error) {
                console.error('加载数据失败:', error);
                hideLoader();
            }
        }
        
        function getCategories() {
            const categories = new Set(aiData.map(item => item.category));
            return ['全部', ...Array.from(categories)];
        }

        function getTags() {
            const tagCounts = {};
            aiData.forEach(item => item.tags.forEach(tag => {
                tagCounts[tag] = (tagCounts[tag] || 0) + 1;
            }));
            
            return Object.entries(tagCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 15)
                .map(entry => entry[0]);
        }
        
        function renderCategories() {
            const categories = getCategories();
            const categoryList = document.getElementById('categoryList');
            
            categoryList.innerHTML = categories.map(category => `
                <button
                    class="category-btn w-full text-left px-4 py-2.5 rounded-lg font-medium transition-all text-sm flex items-center justify-between ${category === currentCategory ? 'active' : 'text-gray-700 dark:text-gray-300'}"
                    onclick="filterByCategory('${category}')"
                >
                    <span>${category}</span>
                    <span class="count-badge">${category === '全部' ? aiData.length : aiData.filter(item => item.category === category).length}</span>
                </button>
            `).join('');
        }

        function renderTags() {
            const tags = getTags();
            const tagList = document.getElementById('tagList');
            
            tagList.innerHTML = tags.map(tag => `
                <button
                    class="text-xs px-2.5 py-1 rounded transition-all duration-200 ${selectedTag === tag ? 'bg-blue-600 text-white shadow-sm' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600'}"
                    onclick="filterByTag('${tag}')"
                >
                    ${tag}
                </button>
            `).join('');
            
            if (selectedTag) {
                tagList.innerHTML += `
                    <button class="text-xs px-2.5 py-1 rounded bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 hover:bg-red-200 dark:hover:bg-red-900/50 transition-colors" onclick="filterByTag(null)">
                        <i class="fas fa-times mr-1"></i>清除
                    </button>
                `;
            }
        }

        function renderFooterCategories() {
            const categories = getCategories().filter(c => c !== '全部').slice(0, 6);
            const footerCategories = document.getElementById('footerCategories');
            if (footerCategories) {
                footerCategories.innerHTML = categories.map(category => `
                    <li><a href="#" onclick="filterByCategory('${category}'); window.scrollTo({top: 0, behavior: 'smooth'}); return false;" class="footer-link text-gray-600 dark:text-gray-400 text-sm block">${category}</a></li>
                `).join('');
            }
        }
        
        function renderTools() {
            const toolsGrid = document.getElementById('toolsGrid');
            const noResults = document.getElementById('noResults');
            const resultCount = document.getElementById('resultCount');
            const resultTitle = document.getElementById('resultTitle');
            
            let filteredData = aiData.filter(item => {
                const matchCategory = currentCategory === '全部' || item.category === currentCategory;
                const matchSearch = searchQuery === '' ||
                    item.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    item.description.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    item.tags.some(tag => tag.toLowerCase().includes(searchQuery.toLowerCase()));
                const matchRating = item.rating >= minRating;
                const matchFeatured = !featuredOnly || item.featured;
                const matchTag = !selectedTag || item.tags.includes(selectedTag);
                
                return matchCategory && matchSearch && matchRating && matchFeatured && matchTag;
            });

            // Sorting
            filteredData.sort((a, b) => {
                switch(currentSort) {
                    case 'rating_desc':
                        return b.rating - a.rating;
                    case 'name_asc':
                        return a.name.localeCompare(b.name, 'zh-CN');
                    case 'newest':
                        return 0;
                    default:
                        return 0;
                }
            });
            
            if (currentSort === 'newest') {
                filteredData.reverse();
            }
            
            resultCount.textContent = `共 ${filteredData.length} 个工具`;
            resultTitle.innerHTML = `<i class="fas fa-th-large text-blue-500 text-xl"></i><span>${currentCategory === '全部' ? '全部工具' : currentCategory}</span>`;
            
            if (filteredData.length === 0) {
                toolsGrid.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }
            
            noResults.classList.add('hidden');
            
            const isList = currentView === 'list';
            
            toolsGrid.innerHTML = filteredData.map((item, index) => `
                <div class="tool-card bg-white dark:bg-dark-card rounded-xl shadow-sm border border-gray-200 dark:border-dark-border overflow-hidden fade-in transition-colors duration-200" style="animation-delay: ${index * 0.05}s">
                    <div class="p-5 ${isList ? 'flex items-center gap-4' : ''}">
                        <div class="${isList ? 'flex-shrink-0' : ''}">
                            <div class="flex items-start justify-between mb-3">
                                <div class="flex items-center">
                                    <div class="tool-icon">
                                        ${item.logo ? `<img src="${item.logo}" alt="${item.name}" class="w-8 h-8 rounded-lg object-cover" onerror="this.parentElement.innerHTML='<span class=\\'text-lg font-semibold\\'>${item.name.charAt(0)}</span>'">` : `<span class="text-lg font-semibold">${item.name.charAt(0)}</span>`}
                                    </div>
                                    <div class="ml-3">
                                        <h3 class="font-semibold text-gray-900 dark:text-white">${item.name}</h3>
                                        <div class="flex items-center mt-0.5">
                                            <span class="rating-star text-sm">
                                                ${'★'.repeat(Math.floor(item.rating))}${'☆'.repeat(5 - Math.floor(item.rating))}
                                            </span>
                                            <span class="text-xs text-gray-500 dark:text-gray-400 ml-1.5">${item.rating}</span>
                                        </div>
                                    </div>
                                </div>
                                ${item.featured ? '<span class="featured-badge text-white text-xs px-2 py-1 rounded-full font-medium ml-2 inline-flex items-center"><i class="fas fa-crown mr-1"></i>精选</span>' : ''}
                            </div>
                            
                            <p class="text-gray-600 dark:text-gray-400 text-sm mb-4 line-clamp-2">${item.description}</p>
                            
                            <div class="flex flex-wrap gap-1.5 mb-4">
                                ${item.tags.slice(0, 3).map(tag => `
                                    <span class="tag text-xs px-2.5 py-1 rounded-full">${tag}</span>
                                `).join('')}
                            </div>
                        </div>
                        
                        <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="visit-btn block w-full text-center py-2.5 px-4 rounded-xl font-medium text-sm text-white">
                            <span class="flex items-center justify-center gap-2">
                                访问网站
                                <i class="fas fa-external-link-alt text-xs"></i>
                            </span>
                        </a>
                    </div>
                </div>
            `).join('');
        }
        
        function filterByCategory(category) {
            currentCategory = category;
            renderCategories();
            renderTools();
            // 移动端关闭侧边栏
            if (window.innerWidth < 1024) {
                closeSidebarFn();
            }
        }
        window.filterByCategory = filterByCategory;

        function filterByTag(tag) {
            selectedTag = selectedTag === tag ? null : tag;
            renderTags();
            renderTools();
        }
        window.filterByTag = filterByTag;
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderTools();
        });
        
        document.getElementById('sortSelect').addEventListener('change', (e) => {
            currentSort = e.target.value;
            renderTools();
        });
        
        document.querySelectorAll('.rating-filter').forEach(checkbox => {
            checkbox.addEventListener('change', () => {
                const checked = Array.from(document.querySelectorAll('.rating-filter:checked'))
                    .map(cb => parseFloat(cb.value));
                minRating = checked.length > 0 ? Math.max(...checked) : 0;
                renderTools();
            });
        });
        
        document.getElementById('featuredFilter').addEventListener('change', (e) => {
            featuredOnly = e.target.checked;
            renderTools();
        });
        
        // 滚动触发动画
        function initScrollAnimations() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.tool-card').forEach(card => {
                observer.observe(card);
            });
        }

        // 返回顶部按钮带进度环
        const backToTopBtn = document.getElementById('backToTop');
        const progressCircle = backToTopBtn?.querySelector('circle');
        
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = (scrollTop / docHeight) * 100;
            
            // 更新进度环
            if (progressCircle) {
                const circumference = 2 * Math.PI * 18; // r=18
                const offset = circumference - (scrollPercent / 100) * circumference;
                progressCircle.style.strokeDashoffset = offset;
            }
            
            // 显示/隐藏按钮
            if (scrollTop > 300) {
                backToTopBtn.classList.remove('hidden');
                backToTopBtn.classList.add('visible');
            } else {
                backToTopBtn.classList.add('hidden');
                backToTopBtn.classList.remove('visible');
            }
        });
        
        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        
        // 初始化
        loadData();
    </script>
</body>
</html>
